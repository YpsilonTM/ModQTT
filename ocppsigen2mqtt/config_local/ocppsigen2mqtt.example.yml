# Sample local dev config for ocppsigen2mqtt
# Copy to config_local/ocppsigen2mqtt.yaml and edit as needed.

ocpp:
  host: 0.0.0.0
  port: 9200

charger_id: 120A64150210
usable_phases: 2

mqtt:
  host: 192.168.x.x
  port: 1883
  username: your_mqtt_username
  password: your_mqtt_password
  client_id: ocppsigen2mqtt-dev
  topic_prefix: dev/ocpp

log_level: DEBUG
